# Workspace → output binding
# DP-3 = Dell ultrawide (left), eDP-1 = laptop (right)
workspace 1 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 2 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 3 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 4 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 5 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 6 output "Dell Inc. Dell U4924DW FLYY0S3"
workspace 7 output eDP-1
workspace 8 output eDP-1
workspace 9 output eDP-1
workspace 10 output eDP-1

# Apps with reliable distinct app_id → assigned to workspace
assign [app_id="^com\.mitchellh\.ghostty$"] workspace number 2
assign [app_id="^org\.gnome\.Evolution$"]  workspace number 7
assign [app_id="^1password$"]              workspace number 8
assign [app_id="^slack$"]                  workspace number 10
# Spotify runs under Xwayland (no app_id) → match X11 class instead
assign [class="^Spotify$"]               workspace number 9
