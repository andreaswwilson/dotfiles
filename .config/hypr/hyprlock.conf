$base    = rgb(191724)
$surface = rgb(1f1d2e)
$text    = rgb(e0def4)
$subtle  = rgb(908caa)
$pine    = rgb(31748f)
$rose    = rgb(ebbcba)
$love    = rgb(eb6f92)
$font    = JetBrainsMono Nerd Font

auth {
    pam {
        enabled = true
        module = hyprlock
    }
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

background {
    monitor =
    path = ~/.config/sway/wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.15
}

# Clock — large, centered above the field
label {
    monitor =
    text = $TIME
    color = $text
    font_size = 72
    font_family = $font
    position = 0, 80
    halign = center
    valign = center
}

# Date — subtle, just under the clock
label {
    monitor =
    text = cmd[update:60000] date +"%a, %d %b"
    color = $subtle
    font_size = 18
    font_family = $font
    position = 0, 10
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 55
    outline_thickness = 2
    rounding = 14
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    inner_color = $surface
    outer_color = $pine
    font_color = $text
    check_color = $rose
    fail_color = $love
    fail_text =
    placeholder_text = <span foreground="##908caa"><i>Password or fingerprint</i></span>
    position = 0, -50
    halign = center
    valign = center
}
