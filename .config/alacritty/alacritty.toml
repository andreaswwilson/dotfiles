[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold Italic"

# Mirror ghostty rose-pine theme (source: ~/.config/ghostty/themes/rose-pine)
[colors.primary]
background = "#191724"
foreground = "#e0def4"

[colors.cursor]
text   = "#191724"
cursor = "#e0def4"

[colors.selection]
text       = "#e0def4"
background = "#403d52"

[colors.normal]
black   = "#26233a"
red     = "#eb6f92"
green   = "#31748f"
yellow  = "#f6c177"
blue    = "#9ccfd8"
magenta = "#c4a7e7"
cyan    = "#ebbcba"
white   = "#e0def4"

# Ghostty rose-pine has no distinct bright variants — mirror normals,
# bright black bumped to muted grey for readability
[colors.bright]
black   = "#6e6a86"
red     = "#eb6f92"
green   = "#31748f"
yellow  = "#f6c177"
blue    = "#9ccfd8"
magenta = "#c4a7e7"
cyan    = "#ebbcba"
white   = "#e0def4"

[scrolling]
history = 100000

[mouse]
hide_when_typing = true
